<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      margin: 0;
    }
    .box {
      text-align: center;
    }
    input {
      padding: 10px;
      font-size: 18px;
      width: 200px;
      margin-top: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Enter Password</h2>
    <input id="pw" type="password" placeholder="Password" />
    <br>
    <button onclick="login()">Enter</button>
  </div>

  <script>
    function login() {
      const validPasswords = ["67", "waguri"]; // add more if needed
      const input = document.getElementById("pw").value;

      if (validPasswords.includes(input)) {
        window.location.href = "/";
      } else {
        alert("Incorrect password.");
      }
    }
  </script>
</body>
</html>
